run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - unconvert
    - revive

linters-settings:
  goimports:
    local-prefixes: goflow/
  revive:
    rules:
      - name: var-naming
      - name: error-return
      - name: error-naming
      - name: if-return
      - name: range
      - name: receiver-naming
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
        disabled: true
      - name: unreachable-code
      - name: redefines-builtin-id

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
        - revive
    - path: backend/internal/transport/http/docs/
      linters:
        - revive
  max-issues-per-linter: 0
  max-same-issues: 0
