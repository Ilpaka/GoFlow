# Локальная конфигурация. Переопределение через переменные окружения (см. internal/config и .env.example).
app:
  port: "8080"

postgres:
  dsn: "postgres://messenger:messenger@localhost:5432/messenger?sslmode=disable"

redis:
  addr: "localhost:6379"

jwt:
  secret: "local-dev-only-change-in-prod-min-16"
  access_ttl_seconds: 900
  refresh_ttl_seconds: 604800
